<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 圆角白框：白色边框 + 每格内角圆角 -->
  <defs>
    <!-- 遮罩：每个格子切出圆角 -->
    <clipPath id="rounded-tl">
      <rect x="40" y="40" width="280" height="280" rx="40"/>
    </clipPath>
    <clipPath id="rounded-tr">
      <rect x="400" y="40" width="280" height="280" rx="40"/>
    </clipPath>
    <clipPath id="rounded-bl">
      <rect x="40" y="400" width="280" height="280" rx="40"/>
    </clipPath>
    <clipPath id="rounded-br">
      <rect x="400" y="400" width="280" height="280" rx="40"/>
    </clipPath>
  </defs>

  <!-- 白色边框 -->
  <g fill="white">
    <!-- 四周外边框 -->
    <rect x="0" y="0" width="1080" height="30"/>
    <rect x="0" y="1050" width="1080" height="30"/>
    <rect x="0" y="0" width="30" height="1080"/>
    <rect x="1050" y="0" width="30" height="1080"/>
    <!-- 中间分隔线 -->
    <rect x="355" y="0" width="30" height="1080"/>
    <rect x="695" y="0" width="30" height="1080"/>
    <rect x="0" y="355" width="1080" height="30"/>
    <rect x="0" y="695" width="1080" height="30"/>
  </g>

  <!-- 每格内圆角遮罩（白色填充四个角） -->
  <g fill="white" opacity="0.9">
    <!-- 第一行 -->
    <path d="M40,40 h40 v-40 h-40 a40,40 0 0 0 -40,40 h40 z"/>
    <path d="M680,40 v-40 h-280 a40,40 0 0 0 -40,40 h320 z"/>
    <rect x="760" y="0" width="40" height="80"/>
    
    <path d="M720,40 h-40 v40 h40 a40,40 0 0 0 40,-40 h-40 z"/>
    <path d="M760,40 v-40 h280 a40,40 0 0 1 40,40 h-320 z"/>
    
    <!-- 第二行 -->
    <rect x="0" y="360" width="80" height="40"/>
    <rect x="760" y="360" width="80" height="40"/>
    <rect x="0" y="680" width="80" height="40"/>
    <rect x="760" y="680" width="80" height="40"/>
    
    <!-- 第三行 -->
    <path d="M40,680 h40 v-40 h-40 a40,40 0 0 0 -40,40 h40 z"/>
    <path d="M680,680 v-40 h-280 a40,40 0 0 0 -40,40 h320 z"/>
    <rect x="760" y="640" width="40" height="80"/>
    
    <path d="M720,680 h-40 v40 h40 a40,40 0 0 0 40,-40 h-40 z"/>
    <path d="M760,680 v-40 h280 a40,40 0 0 1 40,40 h-320 z"/>
    
    <rect x="0" y="1000" width="80" height="40"/>
    <rect x="760" y="1000" width="80" height="40"/>
  </g>
</svg>
