<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 胶片风：黑色边框 + 胶片齿孔 -->
  <defs>
    <pattern id="film-holes" x="0" y="0" width="120" height="40" patternUnits="userSpaceOnUse">
      <!-- 齿孔：每格四个孔 -->
      <rect x="25" y="0" width="20" height="20" fill="white"/>
      <rect x="75" y="0" width="20" height="20" fill="white"/>
      <rect x="25" y="20" width="20" height="20" fill="white"/>
      <rect x="75" y="20" width="20" height="20" fill="white"/>
    </pattern>
  </defs>

  <!-- 上下黑色胶片区域 -->
  <rect x="0" y="0" width="1080" height="40" fill="black"/>
  <rect x="0" y="1040" width="1080" height="40" fill="black"/>
  <rect x="0" y="360" width="1080" height="40" fill="black"/>
  <rect x="0" y="680" width="1080" height="40" fill="black"/>

  <!-- 齿孔覆盖 -->
  <rect x="0" y="0" width="1080" height="40" fill="url(#film-holes)"/>
  <rect x="0" y="1040" width="1080" height="40" fill="url(#film-holes)"/>
  <rect x="0" y="360" width="1080" height="40" fill="url(#film-holes)"/>
  <rect x="0" y="680" width="1080" height="40" fill="url(#film-holes)"/>

  <!-- 左右黑色边框 -->
  <rect x="0" y="0" width="40" height="1080" fill="black"/>
  <rect x="1040" y="0" width="40" height="1080" fill="black"/>
  <rect x="340" y="0" width="40" height="1080" fill="black"/>
  <rect x="700" y="0" width="40" height="1080" fill="black"/>
</svg>
