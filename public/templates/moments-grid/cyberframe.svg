<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义霓虹渐变与滤镜 -->
  <defs>
    <!-- 洋红霓虹渐变 -->
    <linearGradient id="cyberPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="100%" stop-color="#ff2eb6"/>
    </linearGradient>
    <!-- 青蓝霓虹渐变 -->
    <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#2effff"/>
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- 故障风线条蒙版 -->
    <pattern id="circuitPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20 L40 20 M20 0 L20 40" stroke="#00f0ff" stroke-width="0.8" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- 外层暗底电路板纹理（四角装饰） -->
  <rect x="0" y="0" width="1080" height="1080" fill="url(#circuitPattern)" opacity="0.25"/>

  <!-- 核心镂空区：中间大块透明挖空 -->
  <rect x="360" y="360" width="840" height="840" fill="#ffffff" opacity="0"/>

  <!-- 四角赛博朋克尖角边框 -->
  <!-- 左上角 -->
  <path d="M0 0 L180 0 L180 40 L40 40 L40 180 L0 180 Z" fill="none" stroke="url(#cyberPink)" stroke-width="4" filter="url(#glowPink)"/>
  <!-- 右上角 -->
  <path d="M1080 0 L900 0 L900 40 L1040 40 L1040 180 L1080 180 Z" fill="none" stroke="url(#cyberCyan)" stroke-width="4" filter="url(#glowCyan)"/>
  <!-- 左下角 -->
  <path d="M0 1080 L180 1080 L180 1040 L40 1040 L40 900 L0 900 Z" fill="none" stroke="url(#cyberCyan)" stroke-width="4" filter="url(#glowCyan)"/>
  <!-- 右下角 -->
  <path d="M1080 1080 L900 1080 L900 1040 L1040 1040 L1040 900 L1080 900 Z" fill="none" stroke="url(#cyberPink)" stroke-width="4" filter="url(#glowPink)"/>

  <!-- 侧边霓虹分割线条（故障风） -->
  <line x1="220" y1="60" x2="220" y2="180" stroke="#ff0080" stroke-width="3" filter="url(#glowPink)"/>
  <line x1="860" y1="60" x2="860" y2="180" stroke="#00f0ff" stroke-width="3" filter="url(#glowCyan)"/>
  <line x1="220" y1="900" x2="220" y2="1020" stroke="#00f0ff" stroke-width="3" filter="url(#glowCyan)"/>
  <line x1="860" y1="900" x2="860" y2="1020" stroke="#ff0080" stroke-width="3" filter="url(#glowPink)"/>

  <!-- 顶部/底部赛博几何装饰条 -->
  <rect x="280" y="20" width="520" height="8" fill="url(#cyberPink)" filter="url(#glowPink)" opacity="0.8"/>
  <rect x="280" y="1052" width="520" height="8" fill="url(#cyberCyan)" filter="url(#glowCyan)" opacity="0.8"/>

  <!-- 微小像素点点缀（赛博氛围） -->
  <circle cx="150" cy="150" r="4" fill="#ff2eb6" filter="url(#glowPink)"/>
  <circle cx="930" cy="150" r="4" fill="#2effff" filter="url(#glowCyan)"/>
  <circle cx="150" cy="930" r="4" fill="#2effff" filter="url(#glowCyan)"/>
  <circle cx="930" cy="930" r="4" fill="#ff2eb6" filter="url(#glowPink)"/>
</svg>