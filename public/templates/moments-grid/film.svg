<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 正版电影胶片：黑底 + 白色长条齿孔（通透镂空感） -->
    <pattern id="filmHoles" x="0" y="0" width="70" height="90" patternUnits="userSpaceOnUse">
      <!-- 白色镂空齿孔（长条标准胶片孔） -->
      <rect x="30" y="10" width="70" height="70" fill="#fff" />
      <rect x="49" y="10" width="70" height="70" fill="#fff" />
    </pattern>
  </defs>

  <mask id="hole">
    <rect width="100%" height="100%" fill="white" />
    <rect x="0" y="90" width="1080" height="900" fill="black" />
  </mask>

  <!-- 整体基底黑色 -->
  <rect width="1080" height="1080" fill="#000" mask="url(#hole)" />

  <!-- 顶部+底部 黑白通透齿孔区（等高对称） -->
  <rect x="0" y="0" width="1080" height="90" fill="url(#filmHoles)" />
  <rect x="0" y="990" width="1080" height="90" fill="url(#filmHoles)" />






</svg>